semantic_layer:
  version: "1.0.0"
  name: "fipsar_prospect_journey_intelligence_semantic_layer"
  owner: "FIPSAR"
  domain: "Life Sciences / Specialty Pharma / Prospect Journey Intelligence"
  purpose: >
    Provide a rich semantic layer for Analyst, Search, Conversational AI, and Agentic AI
    use cases on top of the FIPSAR Snowflake MVP. This semantic layer explains the business
    meaning, data flow, relationships, quality rules, funnel logic, lineage expectations,
    observability patterns, and AI-ready concepts required for accurate retrieval, reasoning,
    similarity search, grounding, and validation.

  high_level_goal:
    summary: >
      The platform tracks how raw campaign leads enter the system, how they are validated and
      mastered into Prospects, how valid Prospects move through Salesforce Marketing Cloud
      journeys, where records drop in the funnel, where suppression and fatal issues occur,
      and how downstream analytics and AI can detect, explain, and optimize those patterns.
    primary_business_objectives:
      - "Measure lead intake volume and source contribution."
      - "Identify invalid leads and the reasons they were rejected."
      - "Track valid Prospects through SFMC journey stages and engagement events."
      - "Measure funnel drop-offs across intake, mastering, sending, delivery, engagement, and suppression."
      - "Provide complete data lineage and observability from raw intake to marts and AI outputs."
      - "Enable AI use cases such as analyst Q&A, semantic search, conversational exploration, anomaly detection, trust scoring, and action recommendation."
    mvp_focus:
      - "Data flow understanding"
      - "Lineage"
      - "Observability"
      - "Funnel loss measurement"
      - "AI capture of quality and engagement signals"
    closed_loop_intelligence_pattern: "Data -> Validation -> Prospect Mastering -> Engagement -> Mart -> AI Features -> Scores -> Insights / Actions"

  terminology:
    canonical_terms:
      lead:
        definition: >
          A record that has newly entered the system through intake and currently exists in
          QA_FIPSAR_PHI_HUB.STAGING.STG_PROSPECT_INTAKE. At this stage it is unmastered and not yet trusted.
        lifecycle_stage: "Pre-validation"
        allowed_synonyms:
          - "incoming lead"
          - "raw lead"
          - "campaign lead"
        forbidden_synonyms:
          - "prospect"
          - "patient"
      invalid_lead:
        definition: >
          A Lead that failed required quality/mastering rules and was diverted to
          QA_FIPSAR_AUDIT.PIPELINE_AUDIT.DQ_REJECTION_LOG instead of becoming a valid Prospect.
        lifecycle_stage: "Rejected during validation"
        examples:
          - "NULL_EMAIL"
          - "NULL_PHONE_NUMBER"
          - "NO_CONSENT"
      prospect:
        definition: >
          A Lead that passed required mastering rules and was loaded into
          QA_FIPSAR_PHI_HUB.PHI_CORE.PHI_PROSPECT_MASTER. Only after this point should the record
          be referred to as a Prospect in the business context.
        lifecycle_stage: "Mastered and valid"
        allowed_synonyms:
          - "valid prospect"
          - "mastered prospect"
        forbidden_synonyms:
          - "lead"
          - "patient"
      subscriber_key:
        definition: >
          The SFMC engagement identity key. SUBSCRIBER_KEY in all SFMC event tables (RAW_SFMC_SENT,
          RAW_SFMC_OPENS, etc.) and in FACT_SFMC_ENGAGEMENT IS the MASTER_PATIENT_ID (FIP... format).
          Join directly: fe.SUBSCRIBER_KEY = dp.MASTER_PATIENT_ID. No crosswalk needed for
          engagement → prospect bridging. PATIENT_IDENTITY_XREF exists for identity audit purposes
          and email-based lookups, not for the primary SFMC engagement join.
      master_prospect_id:
        definition: >
          Canonical enterprise identifier for a valid mastered Prospect. Physical column name in
          current tables is MASTER_PATIENT_ID, but business meaning in this MVP is Master Prospect ID.
      journey:
        definition: >
          The end-to-end path including the sequence of touchpoints, actions, decisions, and channels
          that move a prospect across stages (and sometimes back and forth). The Journey is the MOTION;
          stages are the STOPS along that journey. There are 4 journeys (J01 Welcome, J02 Nurture,
          J03 Conversion, J04 ReEngagement) that together span the 9 stages.
        allowed_synonyms:
          - "prospect journey"
          - "communication path"
      stage:
        definition: >
          A snapshot phase of the relationship — a discrete point-in-time position that a prospect
          occupies in the lifecycle. There are exactly 9 stages. Stages are STATIC positions;
          a prospect sits IN a stage. Analysing stages reveals WHERE a prospect is, while
          analysing journeys reveals HOW they got there.
      suppression:
        definition: >
          A business or operational outcome where an intended send did not proceed and the record
          should be captured as a rejection/observability signal. Rejection reasons include SUPPRESSED and FATAL_ERROR.
      observability:
        definition: >
          The ability to trace record movement, row loss, rejection reasons, event failures, and
          transformation outcomes across the pipeline.
      lineage:
        definition: >
          The end-to-end path and transformations a record undergoes from source intake through mastering,
          warehouse modeling, marts, and AI feature/scoring layers.

  naming_conventions:
    business_naming_rules:
      - "Use 'Lead' only for records in STG_PROSPECT_INTAKE before mastering."
      - "Use 'Invalid Lead' for any incoming lead rejected during data quality or suppression handling."
      - "Use 'Prospect' only after the record is accepted into PHI_PROSPECT_MASTER."
      - "Do not describe business records as 'Patient' in generated AI explanations for this MVP."
      - "Where physical column/table names contain PATIENT, AI should interpret them as Prospect semantics unless explicitly discussing physical schema."
    schema_prefix_meanings:
      STAGING: "Raw landing layer"
      PHI_CORE: "Mastered identity and sensitive-core prospect layer"
      BRONZE: "Raw warehouse copy"
      SILVER: "Standardized / historized warehouse layer"
      GOLD: "Conformed analytical layer"
      RAW_EVENTS: "Source SFMC event layer"
      AI_FEATURES: "Feature engineering layer"
      AI_SEMANTIC: "Scored / semantically enriched AI layer"
      PIPELINE_AUDIT: "Audit and DQ observability layer"

  systems:
    source_systems:
      - name: "Campaign / App / API / Form Intake"
        function: "Lead creation"
      - name: "Salesforce Marketing Cloud (SFMC)"
        function: "Email journey execution and engagement event generation"
    platform_systems:
      - name: "Snowflake"
        function: "Core storage, warehouse, mart, feature, and semantic AI backbone"
      - name: "AI Consumption Layer"
        function: "Analyst, Search, Conversational AI, and Agents"

  demo_context:
    summary: >
      This Prospect Journey MVP is demonstrated using representative Snowflake data (including
      synthetic rows) shaped for SFMC journey and funnel analytics. Business definitions, join
      rules, date-column rules, and tool usage below apply the same way as for production-shaped
      datasets—always ground answers in tool results for the active environment.

  prompt_compact_tables: true

  hot_tables_for_prompt_detail:
    - "QA_FIPSAR_PHI_HUB.STAGING.STG_PROSPECT_INTAKE"
    - "QA_FIPSAR_PHI_HUB.PHI_CORE.PHI_PROSPECT_MASTER"
    - "QA_FIPSAR_AUDIT.PIPELINE_AUDIT.DQ_REJECTION_LOG"
    - "QA_FIPSAR_DW.GOLD.FACT_SFMC_ENGAGEMENT"
    - "QA_FIPSAR_DW.GOLD.DIM_SFMC_JOB"
    - "QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_PROSPECT_JOURNEY_DETAILS"
    - "QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_SENT"

  physical_data_model:
    databases:
      QA_FIPSAR_PHI_HUB:
        description: "Lead intake staging and mastered Prospect identity layer"
        schemas:
          STAGING:
            tables:
              QA_FIPSAR_PHI_HUB.STAGING.STG_PROSPECT_INTAKE:
                grain: "One row per incoming lead submission"
                business_role: "Raw lead landing table"
                lifecycle_label: "Lead"
                business_date_column: "FILE_DATE"
                date_type: "VARCHAR — MIXED FORMATS"
                date_parsing_note: >
                  FILE_DATE contains two formats in the same table:
                  'YYYY-MM-DD' for historical bulk-loaded records and 'DD-MM-YYYY' for recent campaign-app records.
                  ALWAYS use COALESCE(TRY_TO_DATE(FILE_DATE,'YYYY-MM-DD'), TRY_TO_DATE(FILE_DATE,'DD-MM-YYYY')) for any filter or sort.
                  NEVER do a raw string BETWEEN on FILE_DATE — alphabetical sort puts '05-04-2026' before '2026-01-01',
                  causing wrong MAX(), wrong range counts, and the agent to hallucinate 'no data today'.
                  NEVER use _LOADED_AT as the business date — it is the Snowflake ingest timestamp, not the event date.
                key_columns:
                  - "FIRST_NAME"
                  - "LAST_NAME"
                  - "EMAIL"
                  - "PHONE_NUMBER"
                  - "AGE"
                  - "ADDRESS"
                  - "CITY"
                  - "STATE"
                  - "ZIP_CODE"
                  - "PATIENT_CONSENT"
                  - "CHANNEL"
                  - "SUBMISSION_TIMESTAMP"
                  - "FILE_DATE"
                  - "_LOADED_AT"
                  - "_SOURCE_FILE"
          PHI_CORE:
            tables:
              QA_FIPSAR_PHI_HUB.PHI_CORE.PHI_PROSPECT_MASTER:
                grain: "One row per valid mastered Prospect intake record"
                business_role: "Mastered Prospect core table"
                lifecycle_label: "Prospect"
                business_date_column: "FILE_DATE"
                date_type: "DATE"
                date_parsing_note: "FILE_DATE is a native DATE column — direct BETWEEN filter works correctly."
                key_columns:
                  - "RECORD_ID"
                  - "MASTER_PATIENT_ID"
                  - "FIRST_NAME"
                  - "LAST_NAME"
                  - "EMAIL"
                  - "PHONE_NUMBER"
                  - "PATIENT_CONSENT"
                  - "CHANNEL"
                  - "SUBMISSION_TIMESTAMP"
                  - "FILE_DATE"
                  - "IS_ACTIVE"
              QA_FIPSAR_PHI_HUB.PHI_CORE.PATIENT_IDENTITY_XREF:
                grain: "One row per identity mapping"
                business_role: "master prospect bridge"
                lifecycle_label: "Identity bridge"
                key_columns:
                  - "IDENTITY_KEY"
                  - "MASTER_PATIENT_ID"
                  - "FIRST_NAME"
                  - "LAST_NAME"
                  - "EMAIL"

      QA_FIPSAR_DW:
        description: "Curated warehouse for prospect intake, engagement, marts, and outbound serving"
        schemas:
          BRONZE:
            tables:
              QA_FIPSAR_DW.BRONZE.BRZ_PROSPECT_MASTER:
                grain: "Raw warehouse copy of mastered Prospect rows"
                business_role: "Warehouse bronze copy"
                business_date_column: "FILE_DATE"
                date_type: "DATE"
                date_parsing_note: "FILE_DATE is a native DATE column — direct BETWEEN filter works correctly."
          SILVER:
            tables:
              QA_FIPSAR_DW.SILVER.SLV_PROSPECT_MASTER:
                grain: "Historized prospect row version"
                business_role: "Deduplication and SCD2-History tracked Prospect layer"
                business_date_column: "FILE_DATE"
                date_type: "DATE"
                date_parsing_note: "FILE_DATE is a native DATE column — direct BETWEEN filter works correctly."
                important_columns:
                  - "SLV_KEY"
                  - "MASTER_PATIENT_ID"
                  - "EFF_START_DATE"
                  - "EFF_END_DATE"
                  - "IS_CURRENT"
                  - "VERSION_NUM"
                  - "DQ_PASSED"
          GOLD:
            tables:
              QA_FIPSAR_DW.GOLD.DIM_PROSPECT:
                grain: "One row per valid Prospect"
                business_role: "Core prospect dimension"
                business_date_column: "FIRST_INTAKE_DATE"
                date_type: "DATE"
                date_parsing_note: >
                  Use FIRST_INTAKE_DATE for 'when was this prospect first seen'.
                  LAST_INTAKE_DATE for most recent. NEVER use _LOADED_AT.
                important_columns:
                  - "PROSPECT_KEY"
                  - "MASTER_PATIENT_ID"
                  - "FIRST_NAME"
                  - "LAST_NAME"
                  - "EMAIL"
                  - "PHONE_NUMBER"
                  - "AGE"
                  - "AGE_GROUP"
                  - "CITY"
                  - "STATE"
                  - "ZIP_CODE"
                  - "PATIENT_CONSENT"
                  - "FIRST_INTAKE_DATE"
                  - "LAST_INTAKE_DATE"
                  - "INTAKE_COUNT"
                  - "PRIMARY_CHANNEL"
              QA_FIPSAR_DW.GOLD.DIM_CHANNEL:
                grain: "One row per acquisition channel"
                business_role: "Lead/Prospect source dimension"
                important_columns:
                  - "CHANNEL_KEY"
                  - "CHANNEL_NAME"
                  - "CHANNEL_CATEGORY"
              QA_FIPSAR_DW.GOLD.DIM_DATE:
                grain: "One row per date"
                business_role: "Calendar dimension"
                important_columns:
                  - "DATE_KEY"
                  - "FULL_DATE"
                  - "YEAR"
                  - "QUARTER"
                  - "MONTH"
                  - "MONTH_NAME"
                  - "WEEK_OF_YEAR"
                  - "DAY_OF_WEEK"
                  - "DAY_NAME"
                  - "IS_WEEKEND"
              QA_FIPSAR_DW.GOLD.DIM_ENGAGEMENT_TYPE:
                grain: "One row per engagement event type"
                business_role: "Engagement type dimension"
                important_columns:
                  - "EVENT_TYPE_KEY"
                  - "EVENT_TYPE"
              QA_FIPSAR_DW.GOLD.DIM_GEOGRAPHY:
                grain: "One row per geography combination"
                business_role: "Geographic rollup dimension"
                important_columns:
                  - "GEO_KEY"
                  - "CITY"
                  - "STATE"
                  - "ZIP_CODE"
                  - "REGION"
              QA_FIPSAR_DW.GOLD.DIM_SFMC_JOB:
                grain: "One row per SFMC job metadata combination"
                business_role: "Journey / email / stage dimension"
                important_columns:
                  - "JOB_KEY"
                  - "JOB_ID"
                  - "JOURNEY_TYPE"
                  - "MAPPED_STAGE"
                  - "EMAIL_NAME"
                  - "EMAIL_SUBJECT"
                  - "RECORD_TYPE"
              QA_FIPSAR_DW.GOLD.FACT_PROSPECT_INTAKE:
                grain: "One row per valid prospect intake event"
                business_role: "Prospect intake fact"
                business_date_column: "FILE_DATE"
                date_type: "DATE"
                date_parsing_note: "FILE_DATE is a native DATE column — direct BETWEEN filter works correctly. Do NOT join DATE_KEY→DIM_DATE for date filtering."
                important_columns:
                  - "INTAKE_KEY"
                  - "RECORD_ID"
                  - "MASTER_PATIENT_ID"
                  - "PROSPECT_KEY"
                  - "CHANNEL_KEY"
                  - "DATE_KEY"
                  - "GEO_KEY"
                  - "SUBMISSION_TIMESTAMP"
                  - "FILE_DATE"
                  - "AGE"
                  - "CONSENT_FLAG"
              QA_FIPSAR_DW.GOLD.FACT_SFMC_ENGAGEMENT:
                grain: "One row per SFMC engagement event"
                business_role: "Production engagement fact"
                business_date_column: "EVENT_TIMESTAMP"
                date_type: "TIMESTAMP"
                date_parsing_note: >
                  ALWAYS filter with DATE(EVENT_TIMESTAMP) BETWEEN 'YYYY-MM-DD' AND 'YYYY-MM-DD'.
                  NEVER use DATE_KEY → DIM_DATE join for date filtering — it is broken (surrogate key mismatch)
                  and returns ZERO rows. NEVER use LOADED_AT as the business date.
                important_columns:
                  - "FACT_ENGAGEMENT_KEY"
                  - "SUBSCRIBER_KEY"
                  - "JOB_KEY"
                  - "EVENT_TYPE_KEY"
                  - "DATE_KEY"
                  - "EVENT_TIMESTAMP"
                  - "EVENT_TYPE"
                  - "DOMAIN"
                  - "IS_UNIQUE"
                  - "CLICK_URL"
                  - "BOUNCE_CATEGORY"
                  - "BOUNCE_TYPE"
                  - "REASON"
                  - "IS_SUPPRESSED"
                  - "SUPPRESSION_REASON"
                  - "ACCOUNT_ID"
                  - "JOB_ID"
                  - "RECORD_TYPE"
                  - "SOURCE_FILE_NAME"
                  - "LOADED_AT"
                suppression_column_notes:
                  IS_SUPPRESSED: "Boolean TRUE when this event row represents a suppressed send (sourced from SUPPRESSION_FLAG = Yes in RAW_SFMC_PROSPECT_JOURNEY_DETAILS)"
                  SUPPRESSION_REASON: "Human-readable reason for suppression (e.g. Unsubscribed, Hard Bounce, Manual Suppression)"
              QA_FIPSAR_DW.GOLD.VW_SFMC_PROSPECT_OUTBOUND:
                grain: "One row per outbound-eligible Prospect"
                business_role: "Activation serving layer this data will be sent to SFMC from for journey targeting and all emails will be send based on the inputs from here"
              QA_FIPSAR_DW.GOLD.VW_MART_JOURNEY_INTELLIGENCE:
                grain: "One row per lead or engagement event observation in the business mart"
                business_role: "Final business-ready journey intelligence mart"
                business_date_column: "EVENT_TIMESTAMP"
                date_type: "TIMESTAMP"
                date_parsing_note: "Use DATE(EVENT_TIMESTAMP) BETWEEN 'YYYY-MM-DD' AND 'YYYY-MM-DD' for date filtering. NEVER use _LOADED_AT."

      QA_FIPSAR_SFMC_EVENTS:
        description: "Raw SFMC event landing layer — primary fallback when FACT_SFMC_ENGAGEMENT is empty"
        query_guidance: >
          When FACT_SFMC_ENGAGEMENT returns no rows, query these raw tables using a UNION ALL.
          All event tables share: SUBSCRIBER_KEY (identity bridge key) and JOB_ID (links to DIM_SFMC_JOB).
          Join JOB_ID to QA_FIPSAR_DW.GOLD.DIM_SFMC_JOB to get JOURNEY_TYPE and MAPPED_STAGE.
        schemas:
          RAW_EVENTS:
            tables:
              QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_SENT:
                grain: "One raw sent event per subscriber per job"
                business_role: "Source of truth for email sends — use for actual send count"
                business_date_column: "EVENT_DATE"
                date_type: "VARCHAR — format MM/DD/YYYY HH:MM:SS AM/PM"
                date_parsing_note: "Use TRY_TO_DATE(SPLIT(EVENT_DATE,' ')[0]::STRING,'MM/DD/YYYY') for date filtering. NEVER use bare TRY_TO_DATE(EVENT_DATE) — returns NULL. Use _LOADED_AT only as last-resort fallback."
                key_columns:
                  - "SUBSCRIBER_KEY"
                  - "JOB_ID"
                  - "BATCH_ID"
                  - "LIST_ID"
                  - "EVENT_DATE"
                  - "EMAIL_ADDRESS"
              QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_OPENS:
                grain: "One raw open event"
                business_role: "Email open events — use IS_UNIQUE for unique open count"
                business_date_column: "EVENT_DATE"
                date_type: "VARCHAR — format MM/DD/YYYY HH:MM:SS AM/PM"
                date_parsing_note: "Use TRY_TO_DATE(SPLIT(EVENT_DATE,' ')[0]::STRING,'MM/DD/YYYY') for date filtering."
                key_columns:
                  - "SUBSCRIBER_KEY"
                  - "JOB_ID"
                  - "BATCH_ID"
                  - "LIST_ID"
                  - "EVENT_DATE"
                  - "IS_UNIQUE"
              QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_CLICKS:
                grain: "One raw click event"
                business_role: "Email click events — use URL and IS_UNIQUE for link-level analysis"
                business_date_column: "EVENT_DATE"
                date_type: "VARCHAR — format MM/DD/YYYY HH:MM:SS AM/PM"
                date_parsing_note: "Use TRY_TO_DATE(SPLIT(EVENT_DATE,' ')[0]::STRING,'MM/DD/YYYY') for date filtering."
                key_columns:
                  - "SUBSCRIBER_KEY"
                  - "JOB_ID"
                  - "BATCH_ID"
                  - "LIST_ID"
                  - "EVENT_DATE"
                  - "URL"
                  - "IS_UNIQUE"
              QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_BOUNCES:
                grain: "One raw bounce event"
                business_role: "Bounce events — BOUNCE_CATEGORY distinguishes Hard vs Soft"
                business_date_column: "EVENT_DATE"
                date_type: "VARCHAR — format MM/DD/YYYY HH:MM:SS AM/PM"
                date_parsing_note: "Use TRY_TO_DATE(SPLIT(EVENT_DATE,' ')[0]::STRING,'MM/DD/YYYY') for date filtering."
                key_columns:
                  - "SUBSCRIBER_KEY"
                  - "JOB_ID"
                  - "BATCH_ID"
                  - "LIST_ID"
                  - "EVENT_DATE"
                  - "BOUNCE_CATEGORY"
                  - "BOUNCE_TYPE"
              QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_UNSUBSCRIBES:
                grain: "One raw unsubscribe event per subscriber"
                business_role: >
                  Unsubscribe signals — primary source for WHY a prospect stopped receiving emails.
                  SUBSCRIBER_KEY = MASTER_PATIENT_ID (FIP... format). Join to JOURNEY_DETAILS:
                  RAW_SFMC_UNSUBSCRIBES.SUBSCRIBER_KEY = RAW_SFMC_PROSPECT_JOURNEY_DETAILS.PROSPECT_ID
                  to explain why a suppressed prospect did not receive a specific stage email.
                key_columns:
                  - "ACCOUNT_ID"
                  - "SUBSCRIBER_KEY"
                  - "JOB_ID"
                  - "EVENT_DATE"
                  - "REASON"
                  - "RECORD_TYPE"
                join_notes:
                  - "SUBSCRIBER_KEY = MASTER_PATIENT_ID = PROSPECT_ID — all the same FIP... value"
                  - "EVENT_DATE is VARCHAR stored as 'MM/DD/YYYY HH:MM:SS AM/PM' (e.g. '01/04/2026 10:58:00 AM') — applies to RAW_SFMC_OPENS, RAW_SFMC_CLICKS, RAW_SFMC_SENT, RAW_SFMC_UNSUBSCRIBES"
                  - "For date filtering ALWAYS use: TRY_TO_DATE(SPLIT(EVENT_DATE, ' ')[0]::STRING, 'MM/DD/YYYY') — bare TRY_TO_DATE(EVENT_DATE) returns NULL for all rows"
                  - "If a prospect's unsubscribe EVENT_DATE < a stage's expected send date → they would NOT receive that stage email"
                  - "Use this table alongside JOURNEY_DETAILS to explain per-prospect stage drops"
              QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_SPAM:
                grain: "One raw spam complaint event"
                business_role: "Spam complaint signals — highest severity disengagement"
                key_columns:
                  - "SUBSCRIBER_KEY"
                  - "JOB_ID"
                  - "BATCH_ID"
                  - "LIST_ID"
                  - "EVENT_DATE"
              QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_JOB_METADATA:
                grain: "One row per SFMC job metadata definition"
                business_role: "Maps JOB_ID to journey name, email name, and stage"
                key_columns:
                  - "JOB_ID"
                  - "JOURNEY_TYPE"
                  - "MAPPED_STAGE"
                  - "EMAIL_NAME"
                  - "EMAIL_SUBJECT"
              QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_PROSPECT_C:
                grain: "One row per prospect record in SFMC — current snapshot of what is loaded in SFMC"
                business_role: >
                  SFMC-side current snapshot of prospect attributes. Key column is PROSPECT_ID which
                  equals MASTER_PATIENT_ID (FIP... format). Join: RAW_SFMC_PROSPECT_C.PROSPECT_ID =
                  DIM_PROSPECT.MASTER_PATIENT_ID. Use to reconcile which DIM_PROSPECT records were
                  successfully exported to SFMC (inbound to SFMC).
                key_columns:
                  - "PROSPECT_ID"
                  - "FIRST_NAME"
                  - "LAST_NAME"
                  - "EMAIL_ADDRESS"
                  - "MARKETING_CONSENT"
                  - "HIGH_ENGAGEMENT"
                  - "REGISTRATION_DATE"
                  - "LAST_UPDATED"
                join_notes:
                  - "PROSPECT_ID = MASTER_PATIENT_ID in DIM_PROSPECT — direct join, no crosswalk needed"
                  - "All active DIM_PROSPECT records should have a matching row here after successful export"
                  - "Missing rows = prospect went outbound but was not loaded in SFMC"
              QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_PROSPECT_C_HISTORY:
                grain: "One row per historical batch load of prospect attributes to SFMC"
                business_role: >
                  Tracks historical changes to prospect attributes in SFMC over time. Each batch load
                  creates a new history row. Used to audit the state of prospect data in SFMC at a
                  point-in-time and verify data freshness of outbound exports.
                key_columns:
                  - "PROSPECT_ID"
                  - "FIRST_NAME"
                  - "LAST_NAME"
                  - "EMAIL_ADDRESS"
                  - "MARKETING_CONSENT"
                  - "HIGH_ENGAGEMENT"
                  - "REGISTRATION_DATE"
                  - "BATCH_ID"
                  - "JOB_ID"
                  - "LAST_UPDATED"
                join_notes:
                  - "PROSPECT_ID = MASTER_PATIENT_ID — same direct join as RAW_SFMC_PROSPECT_C"
                  - "BATCH_ID and JOB_ID link to the specific export job that loaded this history record"
              QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_PROSPECT_JOURNEY_DETAILS:
                grain: "One row per prospect — wide table with per-stage sent flags and journey completion status"
                business_role: >
                  Tracks each prospect's journey progress across all 9 stages. This is a WIDE table
                  where each stage has its own SENT flag (VARCHAR 'True'/'False') and SENT_DATE column.
                  SUPPRESSION_FLAG drives suppression observability: when it is TRUE/YES/Y/1,
                  the record is written to DQ_REJECTION_LOG with REJECTION_REASON = 'SUPPRESSED_PROSPECT',
                  and IS_SUPPRESSED = TRUE in FACT_SFMC_ENGAGEMENT.
                  Key: PROSPECT_ID = MASTER_PATIENT_ID (FIP... format).
                key_columns:
                  - "PROSPECT_ID"
                  - "WELCOME_JOURNEY_COMPLETE"
                  - "NURTURE_JOURNEY_COMPLETE"
                  - "SUPPRESSION_FLAG"
                  - "WELCOMEJOURNEY_WELCOMEEMAIL_SENT"
                  - "WELCOMEJOURNEY_WELCOMEEMAIL_SENT_DATE"
                  - "WELCOMEJOURNEY_EDUCATIONEMAIL_SENT"
                  - "WELCOMEJOURNEY_EDUCATIONEMAIL_SENT_DATE"
                  - "NURTUREJOURNEY_EDUCATIONEMAIL1_SENT"
                  - "NURTUREJOURNEY_EDUCATIONEMAIL1_SENT_DATE"
                  - "NURTUREJOURNEY_EDUCATIONEMAIL2_SENT"
                  - "NURTUREJOURNEY_EDUCATIONEMAIL2_SENT_DATE"
                  - "NURTUREJOURNEY_PROSPECTSTORYEMAIL_SENT"
                  - "NURTUREJOURNEY_PROSPECTSTORYEMAIL_SENT_DATE"
                  - "HIGHENGAGEMENT_CONVERSIONEMAIL_SENT"
                  - "HIGHENGAGEMENT_CONVERSIONEMAIL_SENT_DATE"
                  - "HIGHENGAGEMENT_REMINDEREMAIL_SENT"
                  - "HIGHENGAGEMENT_REMINDEREMAIL_SENT_DATE"
                  - "LOWENGAGEMENT_REENGAGEMENTEMAIL_SENT"
                  - "LOWENGAGEMENT_REENGAGEMENTEMAIL_SENT_DATE"
                  - "LOWENGAGEMENTFINALREMINDEREMAIL_SENT"
                  - "LOWENGAGEMENTFINALREMINDEREMAIL_SENT_DATE"
                stage_column_map:
                  stage_1: "WELCOMEJOURNEY_WELCOMEEMAIL_SENT / _DATE (J01 Welcome Email)"
                  stage_2: "WELCOMEJOURNEY_EDUCATIONEMAIL_SENT / _DATE (J01 Education Email)"
                  stage_3: "NURTUREJOURNEY_EDUCATIONEMAIL1_SENT / _DATE (J02 Education Email 1)"
                  stage_4: "NURTUREJOURNEY_EDUCATIONEMAIL2_SENT / _DATE (J02 Education Email 2)"
                  stage_5: "NURTUREJOURNEY_PROSPECTSTORYEMAIL_SENT / _DATE (J02 Prospect Story)"
                  stage_6: "HIGHENGAGEMENT_CONVERSIONEMAIL_SENT / _DATE (J03 Conversion Email)"
                  stage_7: "HIGHENGAGEMENT_REMINDEREMAIL_SENT / _DATE (J03 Reminder Email)"
                  stage_8: "LOWENGAGEMENT_REENGAGEMENTEMAIL_SENT / _DATE (J04 Re-engagement Email)"
                  stage_9: "LOWENGAGEMENTFINALREMINDEREMAIL_SENT / _DATE (J04 Final Reminder)"
                suppression_logic:
                  trigger: "UPPER(TRIM(SUPPRESSION_FLAG)) IN ('YES','Y','TRUE','1')"
                  actions:
                    - "Write to QA_FIPSAR_AUDIT.PIPELINE_AUDIT.DQ_REJECTION_LOG with REJECTION_REASON = 'SUPPRESSED_PROSPECT', TABLE_NAME = 'FACT_SFMC_ENGAGEMENT'"
                    - "Set IS_SUPPRESSED = TRUE and SUPPRESSION_REASON = 'SUPPRESSION_FLAG=YES' in FACT_SFMC_ENGAGEMENT"
                    - "Count as funnel loss at F04 (SFMC Planned / Sent / Suppressed)"
                join_notes:
                  - "PROSPECT_ID = MASTER_PATIENT_ID = SUBSCRIBER_KEY (all three are the same FIP... value)"
                  - "To query suppressed prospects: WHERE UPPER(TRIM(SUPPRESSION_FLAG)) IN ('YES','Y','TRUE','1')"

      QA_FIPSAR_AUDIT:
        description: "Operational observability and data quality control layer"
        schemas:
          PIPELINE_AUDIT:
            tables:
              QA_FIPSAR_AUDIT.PIPELINE_AUDIT.PIPELINE_RUN_LOG:
                grain: "One row per pipeline/table execution"
                business_role: "Execution observability — every pipeline stage (Staging→PHI, PHI→Bronze, Bronze→Silver dedup, Silver→Gold, SFMC raw ingest, outbound) writes a record here on each run"
                key_columns:
                  - "RUN_ID"
                  - "PIPELINE_NAME"
                  - "TABLE_NAME"
                  - "STATUS"
                  - "ROWS_PROCESSED"
                  - "ROWS_INSERTED"
                  - "ROWS_REJECTED"
                  - "RUN_START_TIME"
                  - "RUN_END_TIME"
                  - "ERROR_MESSAGE"
                pipeline_stages_that_log_here:
                  - "STG_PROSPECT_INTAKE load (S3 → Staging)"
                  - "PHI mastering (Staging → PHI_PROSPECT_MASTER)"
                  - "Bronze copy (PHI_PROSPECT_MASTER → BRZ_PROSPECT_MASTER)"
                  - "Silver dedup load (BRZ → SLV_PROSPECT_MASTER)"
                  - "Gold dimensional load (SLV → DIM_PROSPECT, FACT_PROSPECT_INTAKE, etc.)"
                  - "SFMC raw event ingest (S3 → RAW_SFMC_* tables)"
                  - "SFMC engagement modeling (RAW_SFMC_* → FACT_SFMC_ENGAGEMENT)"
                  - "SFMC journey details ingest (S3 → RAW_SFMC_PROSPECT_JOURNEY_DETAILS)"
              QA_FIPSAR_AUDIT.PIPELINE_AUDIT.DQ_REJECTION_LOG:
                grain: "One row per rejected record"
                business_role: "Quality and suppression rejection observability"
                important_columns:
                  - "REJECTION_ID"
                  - "TABLE_NAME"
                  - "REJECTION_REASON"
                  - "REJECTED_RECORD"
                  - "REJECTED_AT"

      QA_FIPSAR_AI:
        description: >
          AI feature engineering, scoring, and semantic intelligence layer.
          Powers 3 use cases: UC03 (Send-Time Optimization), UCA (Prospect 360 Scoring),
          UCB (Signal Trust). Each follows FEAT_* (features) → SEM_* (current scores)
          → HIST_* (historical archive), with AI_RUN_DETAILS tracking model runs.
        schemas:
          AI_FEATURES:
            tables:
              QA_FIPSAR_AI.AI_FEATURES.FEAT_UC03_SEND_TIME:
                grain: "One row per prospect per hour-of-day (PK: MASTER_PATIENT_ID + SEND_HOUR)"
                business_role: "Hourly engagement features for send-time optimization"
                key_columns:
                  - "MASTER_PATIENT_ID"
                  - "SEND_HOUR"
                  - "DAY_OF_WEEK"
                  - "IS_WEEKEND"
                  - "SENDS_AT_HOUR"
                  - "OPENS_AT_HOUR"
                  - "CLICKS_AT_HOUR"
                  - "OPEN_RATE_AT_HOUR"
                  - "CLICK_RATE_AT_HOUR"
                  - "AGE_GROUP"
                  - "REGION"
                  - "PRIMARY_CHANNEL"
                  - "TOTAL_SENDS_ALLHOURS"
                  - "TOTAL_OPENS_ALLHOURS"
                  - "OVERALL_OPEN_RATE"
                  - "HOUR_VS_AVG_LIFT"
                  - "BEST_HOUR_FLAG"
              QA_FIPSAR_AI.AI_FEATURES.TEST_UC03_SEND_TIME:
                grain: "Test/holdout split of FEAT_UC03_SEND_TIME (same schema + FEATURE_BUILT_AT)"
                business_role: "Send-time feature test set"
              QA_FIPSAR_AI.AI_FEATURES.FEAT_UCA_PROSPECT_360:
                grain: "One row per prospect (PK: MASTER_PATIENT_ID)"
                business_role: "Comprehensive prospect-level features for conversion/dropoff/fatigue modeling"
                key_columns:
                  - "MASTER_PATIENT_ID"
                  - "AGE"
                  - "AGE_GROUP"
                  - "STATE"
                  - "REGION"
                  - "PRIMARY_CHANNEL"
                  - "INTAKE_COUNT"
                  - "DAYS_SINCE_FIRST_INTAKE"
                  - "TOTAL_SENDS"
                  - "TOTAL_OPENS"
                  - "TOTAL_CLICKS"
                  - "TOTAL_BOUNCES"
                  - "TOTAL_UNSUBS"
                  - "OPEN_RATE"
                  - "CLICK_TO_OPEN_RATE"
                  - "UNIQUE_STAGES_REACHED"
                  - "MAX_STAGE_ORDINAL"
                  - "LAST_ENGAGEMENT_DAYS_AGO"
                  - "HAS_CLICKED"
                  - "DAYS_IN_JOURNEY"
                  - "DAYS_SINCE_LAST_OPEN"
                  - "ENGAGEMENT_DECLINE_FLAG"
                  - "CONVERTED_FLAG"
                  - "JOURNEY_DROPPED_FLAG"
                  - "EMAIL_FATIGUED_FLAG"
                  - "FEATURE_BUILT_AT"
              QA_FIPSAR_AI.AI_FEATURES.TEST_UCA_PROSPECT_360:
                grain: "Test/holdout split of FEAT_UCA_PROSPECT_360 (same schema, no FEATURE_BUILT_AT)"
                business_role: "Prospect 360 feature test set"
          AI_SEMANTIC:
            tables:
              QA_FIPSAR_AI.AI_SEMANTIC.SEM_UC03_SEND_TIME_SCORES:
                grain: "One row per prospect (PK: MASTER_PATIENT_ID)"
                business_role: "Current send-time optimization scores — predicted best hour/day to send"
                key_columns:
                  - "MASTER_PATIENT_ID"
                  - "BEST_SEND_HOUR"
                  - "BEST_SEND_DAY"
                  - "BEST_SEND_WINDOW"
                  - "PREDICTED_OPEN_RATE"
                  - "BASELINE_OPEN_RATE"
                  - "ENGAGEMENT_LIFT"
                  - "CONFIDENCE_FLAG"
                  - "SCORED_AT"
                  - "MODEL_VERSION"
                  - "RUN_ID"
              QA_FIPSAR_AI.AI_SEMANTIC.HIST_UC03_SEND_TIME_SCORES:
                grain: "Historical archive of send-time scores (same schema as SEM_UC03)"
                business_role: "Send-time score history for longitudinal analysis"
              QA_FIPSAR_AI.AI_SEMANTIC.SEM_UCA_PROSPECT_360_SCORES:
                grain: "One row per prospect (PK: MASTER_PATIENT_ID)"
                business_role: "Current prospect 360 scores — conversion, dropoff, fatigue, clustering"
                key_columns:
                  - "MASTER_PATIENT_ID"
                  - "CONVERSION_PROBABILITY"
                  - "CONVERSION_RISK_TIER"
                  - "DROPOFF_PROBABILITY"
                  - "DROPOFF_RISK_TIER"
                  - "FATIGUE_SCORE"
                  - "IS_FATIGUED"
                  - "CLUSTER_SEGMENT_ID"
                  - "CLUSTER_LABEL"
                  - "SEND_STATUS"
                  - "COMPOSITE_HEALTH_SCORE"
                  - "RECOMMENDED_ACTION"
                  - "SCORED_AT"
                  - "MODEL_VERSION"
                  - "RUN_ID"
              QA_FIPSAR_AI.AI_SEMANTIC.HIST_UCA_PROSPECT_360_SCORES:
                grain: "Historical archive of prospect 360 scores (same schema as SEM_UCA)"
                business_role: "Prospect 360 score history for longitudinal analysis"
              QA_FIPSAR_AI.AI_SEMANTIC.SEM_UCB_SIGNAL_TRUST_SCORES:
                grain: "One row per engagement event (PK: ENGAGEMENT_KEY)"
                business_role: "Current signal trust scores — bot detection, anomaly flagging per event"
                key_columns:
                  - "ENGAGEMENT_KEY"
                  - "SUBSCRIBER_KEY"
                  - "MASTER_PATIENT_ID"
                  - "JOB_ID"
                  - "EVENT_TYPE"
                  - "BOT_PROBABILITY"
                  - "IS_BOT_FLAG"
