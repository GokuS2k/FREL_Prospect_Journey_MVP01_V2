  lineage_summary:
    canonical_flow:
      - "Step 01 [Intake]: Campaign/App/API/Form -> AWS S3 -> QA_FIPSAR_PHI_HUB.STAGING.STG_PROSPECT_INTAKE | Log: PIPELINE_RUN_LOG"
      - "Step 02 [Mastering]: STG_PROSPECT_INTAKE -> validation (NULL_EMAIL, NULL_FIRST_NAME, NULL_LAST_NAME, NULL_PHONE_NUMBER, INVALID_FILE_DATE checks) | Log: PIPELINE_RUN_LOG"
      - "Step 02a [Rejection]: Invalid leads -> DQ_REJECTION_LOG (TABLE_NAME='PHI_PROSPECT_MASTER', REJECTION_REASON=NULL_EMAIL/NULL_FIRST_NAME/NULL_LAST_NAME/NULL_PHONE_NUMBER/INVALID_FILE_DATE) | Log: PIPELINE_RUN_LOG"
      - "Step 02b [Mastered]: Valid leads -> QA_FIPSAR_PHI_HUB.PHI_CORE.PHI_PROSPECT_MASTER (MASTER_PATIENT_ID FIP... assigned here) | Log: PIPELINE_RUN_LOG"
      - "Step 03 [Bronze]: PHI_PROSPECT_MASTER -> QA_FIPSAR_DW.BRONZE.BRZ_PROSPECT_MASTER (delta load, raw warehouse copy) | Log: PIPELINE_RUN_LOG"
      - "Step 04 [Silver]: BRZ_PROSPECT_MASTER -> deduplication by RECORD_ID -> QA_FIPSAR_DW.SILVER.SLV_PROSPECT_MASTER (SCD Type 2: EFF_START_DATE, EFF_END_DATE, IS_CURRENT, VERSION_NUM) | Log: PIPELINE_RUN_LOG"
      - "Step 04a [Dedup Rejection]: Duplicate RECORD_ID -> DQ_REJECTION_LOG (TABLE_NAME='SLV_PROSPECT_MASTER', REJECTION_REASON=DUPLICATE_RECORD_ID or DUPLICATE_RECORD_ID_IN_BRONZE) | Log: PIPELINE_RUN_LOG"
      - "Step 05 [Gold Dimensions]: SLV_PROSPECT_MASTER (IS_CURRENT=TRUE rows) -> QA_FIPSAR_DW.GOLD.DIM_PROSPECT, DIM_GEOGRAPHY, DIM_DATE, DIM_CHANNEL | Log: PIPELINE_RUN_LOG"
      - "Step 06 [Gold Facts]: DIM_PROSPECT + DIM_DATE + DIM_CHANNEL + DIM_GEOGRAPHY -> QA_FIPSAR_DW.GOLD.FACT_PROSPECT_INTAKE | Log: PIPELINE_RUN_LOG"
      - "Step 07 [Identity Bridge]: PHI_PROSPECT_MASTER -> QA_FIPSAR_PHI_HUB.PHI_CORE.PATIENT_IDENTITY_XREF (for audit/email lookup; NOTE: SFMC SUBSCRIBER_KEY joins directly to MASTER_PATIENT_ID)"
      - "Step 08 [Outbound to SFMC]: QA_FIPSAR_DW.GOLD.DIM_PROSPECT (ACTIVE records only) -> VW_SFMC_PROSPECT_OUTBOUND -> AWS S3 outbound -> Salesforce Marketing Cloud | Log: PIPELINE_RUN_LOG"
      - "Step 08a [SFMC Inbound Validation]: RAW_SFMC_PROSPECT_C.PROSPECT_ID = DIM_PROSPECT.MASTER_PATIENT_ID — verify all exported prospects loaded into SFMC"
      - "Step 09 [SFMC Journey]: SFMC executes 4 Journeys / 9 Stages with fixed stage intervals; SUBSCRIBER_KEY in all SFMC outputs = MASTER_PATIENT_ID (FIP... format)"
      - "Step 10 [SFMC Raw Events]: SFMC S3 -> QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_SENT/OPENS/CLICKS/BOUNCES/UNSUBSCRIBES/SPAM (SUBSCRIBER_KEY = MASTER_PATIENT_ID) | Log: PIPELINE_RUN_LOG"
      - "Step 10a [SFMC Prospect Data]: SFMC S3 -> RAW_SFMC_PROSPECT_C (current snapshot), RAW_SFMC_PROSPECT_C_HISTORY (batch history), RAW_SFMC_PROSPECT_JOURNEY_DETAILS (wide per-stage flags) | Log: PIPELINE_RUN_LOG"
      - "Step 10b [Suppression Detection]: RAW_SFMC_PROSPECT_JOURNEY_DETAILS (SUPPRESSION_FLAG IN ('YES','Y','TRUE','1')) -> DQ_REJECTION_LOG (TABLE_NAME='FACT_SFMC_ENGAGEMENT', REJECTION_REASON='SUPPRESSED_PROSPECT') | Log: PIPELINE_RUN_LOG"
      - "Step 11 [SFMC Job Dim]: RAW_SFMC_JOB_METADATA -> QA_FIPSAR_DW.GOLD.DIM_SFMC_JOB | Log: PIPELINE_RUN_LOG"
      - "Step 12 [SFMC Gold]: RAW_SFMC_* + suppression signals -> FACT_SFMC_ENGAGEMENT (IS_SUPPRESSED=TRUE, SUPPRESSION_REASON='SUPPRESSION_FLAG=YES' for suppressed rows; SUBSCRIBER_KEY=MASTER_PATIENT_ID) | Log: PIPELINE_RUN_LOG"
      - "Step 12a [SFMC Engagement Dims]: RAW_SFMC_* -> QA_FIPSAR_DW.GOLD.DIM_ENGAGEMENT_TYPE, DIM_SFMC_JOB | Log: PIPELINE_RUN_LOG"
      - "Step 13 [Mart]: Gold dimensions/facts -> QA_FIPSAR_DW.GOLD.VW_MART_JOURNEY_INTELLIGENCE"
      - "Step 14 [AI Features]: Gold / mart outputs -> QA_FIPSAR_AI.AI_FEATURES.FEAT_UCA_PROSPECT_360, FEAT_UC03_SEND_TIME"
      - "Step 15 [AI Scores]: AI features -> QA_FIPSAR_AI.AI_SEMANTIC.SEM_UCA_PROSPECT_360_SCORES, SEM_UC03_SEND_TIME_SCORES, SEM_UCB_SIGNAL_TRUST_SCORES"

  examples:
    example_1_valid_lead_to_prospect:
      narrative: >
        Benjamin Rodriguez submits a Campaign App form with valid first name, last name, email,
        phone, and consent. The row lands as a Lead in STG_PROSPECT_INTAKE, passes mastering,
        becomes a valid Prospect in PHI_PROSPECT_MASTER, is mapped through PATIENT_IDENTITY_XREF,
        and appears downstream in DIM_PROSPECT and FACT_PROSPECT_INTAKE.
      expected_outcomes:
        - "Present in STG_PROSPECT_INTAKE"
        - "Absent from DQ_REJECTION_LOG for intake validation"
        - "Present in PHI_PROSPECT_MASTER"
        - "Present in PATIENT_IDENTITY_XREF"
        - "Present in DIM_PROSPECT"
        - "Present in FACT_PROSPECT_INTAKE"
    example_2_invalid_lead_null_email:
      narrative: >
        A lead arrives with EMAIL = null. It remains a Lead, fails mastering, is logged as an
        Invalid Lead in DQ_REJECTION_LOG with REJECTION_REASON = NULL_EMAIL, and does not become a Prospect.
      expected_outcomes:
        - "Present in STG_PROSPECT_INTAKE"
        - "Present in DQ_REJECTION_LOG with REJECTION_REASON = NULL_EMAIL"
        - "Absent from PHI_PROSPECT_MASTER"
        - "Absent from DIM_PROSPECT"
        - "Absent from FACT_PROSPECT_INTAKE"
    example_3_valid_prospect_sent_open_click:
      narrative: >
        A valid Prospect with identity bridge receives a welcome email, opens it, and clicks a link.
        Raw SFMC events land in RAW_SFMC_SENT, RAW_SFMC_OPENS, and RAW_SFMC_CLICKS, then flow to FACT_SFMC_ENGAGEMENT.
      expected_outcomes:
        - "FACT_SFMC_ENGAGEMENT contains SENT, OPEN, CLICK for the subscriber"
        - "DIM_SFMC_JOB resolves job metadata"
        - "VW_MART_JOURNEY_INTELLIGENCE shows journey/stage flags and engagement flags"
    example_4_suppressed_send:
      narrative: >
        A valid Prospect is eligible for a journey step, but SFMC suppresses the send. This should
        be captured as an observability signal, reflected in DQ_REJECTION_LOG with SUPPRESSED or
        FATAL_ERROR, and represented downstream in mart/AI interpretations as funnel loss.
      expected_outcomes:
        - "DQ_REJECTION_LOG contains REJECTION_REASON = SUPPRESSED or FATAL_ERROR"
        - "Mart or AI interpretation can attribute funnel drop to suppression/fatal pathway"

  validation_scenarios:
    data_quality_validations:
      - name: "intake_null_email_rejection"
        description: "Any intake lead with null EMAIL must not appear in PHI_PROSPECT_MASTER"
        assertions:
          - "Rejected row exists in DQ_REJECTION_LOG"
          - "No accepted Prospect exists for same lead identity"
      - name: "no_consent_rejection"
        description: "Any intake lead without valid consent must be rejected"
        assertions:
          - "DQ_REJECTION_LOG has REJECTION_REASON = NO_CONSENT"
          - "Prospect mastering does not occur"
      - name: "valid_lead_promoted_to_prospect"
        description: "A valid lead should appear in PHI_PROSPECT_MASTER and downstream prospect layers"
      - name: "subscriber_identity_bridge_integrity"
        description: "FACT_SFMC_ENGAGEMENT.SUBSCRIBER_KEY should bridge to PATIENT_IDENTITY_XREF and then DIM_PROSPECT"
      - name: "job_metadata_integrity"
        description: "Every FACT_SFMC_ENGAGEMENT.JOB_KEY should resolve to DIM_SFMC_JOB"
      - name: "date_key_integrity"
        description: "Every fact DATE_KEY should resolve to DIM_DATE"
      - name: "engagement_type_integrity"
        description: "Every FACT_SFMC_ENGAGEMENT.EVENT_TYPE_KEY should resolve to DIM_ENGAGEMENT_TYPE"
      - name: "suppression_observability"
        description: "Suppressed/fatal outcomes should be visible in DQ_REJECTION_LOG and interpretable downstream"
    funnel_validations:
      - name: "lead_to_prospect_balance"
        formula: "lead_count = valid_prospect_count + invalid_lead_count + unresolved_exception_count"
      - name: "send_balance"
        formula: "expected_send_count = actual_send_count + unsent_count + suppressed/fatal exceptions where modeled"
      - name: "delivery_balance"
        formula: "actual_send_count >= delivered_count + bounce_count"
      - name: "engagement_balance"
        formula: "delivered_count >= open_count >= unique_open_count"
      - name: "click_balance"
        formula: "open_count >= click_count >= unique_click_count"
    ai_validations:
      - name: "ai_feature_coverage"
        description: "Most valid Prospects should have Prospect 360 features unless intentionally filtered"
      - name: "trust_score_penalizes_bad_signals"
        description: "Records with repeated DQ issues, suppression, or fatal patterns should not receive high trust"
      - name: "send_time_scoring_requires_event_history"
        description: "Send-time scoring should rely on available engagement timing history and degrade gracefully when history is sparse"

  conversational_guidance:
    answering_rules:
      - "Always state whether the entity being discussed is a Lead, Invalid Lead, or Prospect."
      - "When explaining identity, say SUBSCRIBER_KEY bridges to Prospect via PATIENT_IDENTITY_XREF."
      - "When a physical column says MASTER_PATIENT_ID, explain it as the master Prospect identifier in business terms."
      - "When asked about data loss, explicitly check both DQ_REJECTION_LOG and suppression/fatal pathways."
      - "When asked about journey performance, prefer VW_MART_JOURNEY_INTELLIGENCE."
      - "When asked about raw event provenance, refer to RAW_SFMC_* tables."
      - "When asked about AI readiness, explain that both success signals and failure signals are intentionally preserved."
      - "For ALL SFMC email/engagement queries, always call get_sfmc_engagement_stats first. If it returns no data, immediately use run_sql with the raw SFMC UNION ALL pattern across all RAW_SFMC_* tables."
      - "NEVER tell the user 'no SFMC data exists' without first trying both FACT_SFMC_ENGAGEMENT (via EVENT_TIMESTAMP) AND the raw tables QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_SENT/OPENS/CLICKS/BOUNCES/UNSUBSCRIBES/SPAM."
      - "When asked about emails sent, opened, clicked, bounced, or suppressed — always show a breakdown by journey (J01_Welcome, J02_Nurture, J03_Conversion, J04_ReEngagement) and by event type."
      - "For suppression counts, always query DQ_REJECTION_LOG with dual date filter (FILE_DATE from JSON OR REJECTED_AT) in addition to SFMC event tables."
      - "When reporting SFMC stats, always include ALL event types in the response: SENT, OPEN, CLICK, BOUNCE, UNSUBSCRIBE, SPAM, and SUPPRESSED/FATAL from rejection log."
    refusal_rules:
      - "Do not claim a record is a Prospect if it only exists in STG_PROSPECT_INTAKE."
      - "Do not ignore DQ_REJECTION_LOG when explaining funnel gaps."
      - "Do not collapse SUPPRESSED and FATAL_ERROR into generic null/missing behavior."
      - "Do not say 'no SFMC engagement data found' after only checking FACT_SFMC_ENGAGEMENT — always also check raw SFMC tables before concluding no data exists."
      - "Do not use DIM_DATE join on FACT_SFMC_ENGAGEMENT for date filtering — it returns zero rows due to surrogate key issues."

