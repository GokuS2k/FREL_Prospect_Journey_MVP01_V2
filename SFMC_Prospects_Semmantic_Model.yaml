  funnel_model:
    description: >
      The funnel is designed to make data loss, data acceptance, delivery loss, and engagement
      progression measurable. AI and analyst systems should reason about the funnel as a sequence
      of observable stages, not merely as a reporting artifact.
    stages:
      - stage_id: "F01"
        name: "Lead Intake"
        entity_label: "Lead"
        source_table: "QA_FIPSAR_PHI_HUB.STAGING.STG_PROSPECT_INTAKE"
        metric_examples:
          - "lead_count"
          - "lead_count_by_channel"
          - "lead_count_by_file_date"
      - stage_id: "F02"
        name: "Lead Validation / Mastering"
        entity_label: "Lead -> Prospect or Invalid Lead"
        source_tables:
          - "QA_FIPSAR_PHI_HUB.PHI_CORE.PHI_PROSPECT_MASTER"
          - "QA_FIPSAR_AUDIT.PIPELINE_AUDIT.DQ_REJECTION_LOG"
        metric_examples:
          - "valid_prospect_count"
          - "invalid_lead_count"
          - "rejection_count_by_reason"
          - "lead_to_prospect_conversion_rate"
      - stage_id: "F03"
        name: "Prospect Intake Fact"
        entity_label: "Prospect"
        source_table: "QA_FIPSAR_DW.GOLD.FACT_PROSPECT_INTAKE"
        metric_examples:
          - "prospect_intake_events"
          - "valid_prospect_intake_by_channel"
          - "consented_prospect_intake"
      - stage_id: "F04"
        name: "SFMC Planned / Sent / Suppressed"
        entity_label: "Prospect engagement target"
        source_tables:
          - "QA_FIPSAR_DW.GOLD.FACT_SFMC_ENGAGEMENT"
          - "QA_FIPSAR_AUDIT.PIPELINE_AUDIT.DQ_REJECTION_LOG"
        metric_examples:
          - "expected_send_count"
          - "actual_send_count"
          - "unsent_count"
          - "suppressed_count"
          - "fatal_error_count"
      - stage_id: "F05"
        name: "Delivery"
        entity_label: "Delivered Prospect touchpoint"
        source_table: "QA_FIPSAR_DW.GOLD.VW_MART_JOURNEY_INTELLIGENCE"
        metric_examples:
          - "delivered_count"
          - "bounce_count"
          - "hard_bounce_count"
          - "soft_bounce_count"
      - stage_id: "F06"
        name: "Engagement"
        entity_label: "Engaged Prospect"
        source_table: "QA_FIPSAR_DW.GOLD.VW_MART_JOURNEY_INTELLIGENCE"
        metric_examples:
          - "open_count"
          - "unique_open_count"
          - "click_count"
          - "unique_click_count"
          - "unsubscribe_count"
          - "spam_count"
      - stage_id: "F07"
        name: "Journey Progression"
        entity_label: "Journey-stage qualified Prospect"
        source_table: "QA_FIPSAR_DW.GOLD.VW_MART_JOURNEY_INTELLIGENCE"
        metric_examples:
          - "prospects_in_journey_stage"
          - "journey_completion_count"
          - "journey_dropoff_count"
          - "days_in_journey"
      - stage_id: "F08"
        name: "AI Interpretation"
        entity_label: "Scored Prospect / scored signal"
        source_tables:
          - "QA_FIPSAR_AI.AI_FEATURES.FEAT_UCA_PROSPECT_360"
          - "QA_FIPSAR_AI.AI_FEATURES.FEAT_UC03_SEND_TIME"
          - "QA_FIPSAR_AI.AI_SEMANTIC.SEM_UCA_PROSPECT_360_SCORES"
          - "QA_FIPSAR_AI.AI_SEMANTIC.SEM_UC03_SEND_TIME_SCORES"
          - "QA_FIPSAR_AI.AI_SEMANTIC.SEM_UCB_SIGNAL_TRUST_SCORES"
        metric_examples:
          - "high_value_prospect_count"
          - "recommended_send_window"
          - "low_trust_signal_count"
          - "suppression_risk_score"

  journey_definition:
    description: "Canonical prospect journey map used in marts and AI semantics"
    journeys:
      - journey_code: "J01_Welcome"
        journey_name: "Prospect Welcome Journey"
        stages:
          - stage_number: 1
            stage_name: "Welcome Email"
            email_names:
              - "Prospect_Welcome_01_Welcome_Email"
              - "Prospect_Welcome_01_Welcome_Email_Resend"
          - stage_number: 2
            stage_name: "Education Email"
            email_names:
              - "Prospect_Welcome_02_Education_Email"
      - journey_code: "J02_Nurture"
        journey_name: "Prospect Nurture Journey"
        stages:
          - stage_number: 3
            stage_name: "Education Email 1"
            email_names:
              - "Prospect_Nurture_01_Education_Email_1"
              - "Prospect_Nurture_01_Education_Email_1_Resend"
              - "Prospect_Nurture_01_Education_Email_1 _Resend"
          - stage_number: 4
            stage_name: "Education Email 2"
            email_names:
              - "Prospect_Nurture_02_Education_Email_2"
          - stage_number: 5
            stage_name: "Prospect Story Email"
            email_names:
              - "Prospect_Nurture_03_Prospect_Story_Email"
              - "Prospect_Nurture_03_Prospect_Story_Email_Resend"
              - "Prospect_Nurture_03_Patient_Story_Email"
      - journey_code: "J03_Conversion"
        journey_name: "High Engagement Conversion"
        stages:
          - stage_number: 6
            stage_name: "Conversion Email"
            email_names:
              - "Prospect_Conversion_01_Conversion_Email"
          - stage_number: 7
            stage_name: "Reminder Email"
            email_names:
              - "Prospect_Conversion_02_Reminder_Email"
      - journey_code: "J04_ReEngagement"
        journey_name: "Low Engagement Re-engagement"
        stages:
          - stage_number: 8
            stage_name: "Re-engagement Email"
            email_names:
              - "Prospect_ReEngagement_01_ReEngagement_Email"
          - stage_number: 9
            stage_name: "Final Reminder Email"
            email_names:
              - "Prospect_ReEngagement_02_Final_Reminder_Email"
    stage_intervals_days:
      description: >
        Fixed calendar intervals (in days) between consecutive journey stages.
        All prospects follow the same schedule — intervals are uniform across the program.
        These are used to compute EXPECTED_NEXT_STAGE_DATE for each prospect and to detect
        missed sends (where actual delivered count < expected send count for a stage on a given date).
      intervals:
        stage_1_to_2: 3
        stage_2_to_3: 5
        stage_3_to_4: 8
        stage_4_to_5: 3
        stage_5_to_6: 2
        stage_6_to_7: 2
        stage_7_to_8: 2
        stage_8_to_9: 2
      usage_notes:
        - "EXPECTED_NEXT_STAGE_DATE = STAGE_ENTRY_DATE + interval_days (stored in RAW_SFMC_PROSPECT_JOURNEY_DETAILS)"
        - "A 'missed send' occurs when expected_send_count for a stage on a date > actual SENT count in RAW_SFMC_SENT or FACT_SFMC_ENGAGEMENT"
        - "Missed sends may be due to suppression (SUPPRESSION_FLAG = Yes), bounce, or pipeline failure"
        - "Example: On Stage 3 today, 100 prospects expected but only 80 SENT events recorded → 20 missed sends"

    missed_send_analytics:
      description: >
        Analytics pattern to detect and quantify prospects who should have received an email
        in a given stage but did not. This is a critical observability metric.
      actual_send_source: "QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_SENT or QA_FIPSAR_DW.GOLD.FACT_SFMC_ENGAGEMENT (EVENT_TYPE = SENT)"
      missed_send_reasons:
        - "SUPPRESSED_PROSPECT (SUPPRESSION_FLAG IN ('YES','Y','TRUE','1') in RAW_SFMC_PROSPECT_JOURNEY_DETAILS)"
        - "FATAL_ERROR (pipeline or SFMC platform error)"
        - "Bounce (existing hard bounce suppression at SFMC level)"
        - "Unsubscribed (prior unsubscribe record exists)"
      observability_destination: "QA_FIPSAR_AUDIT.PIPELINE_AUDIT.DQ_REJECTION_LOG with REJECTION_REASON = 'SUPPRESSED_PROSPECT' or 'FATAL_ERROR'"

    per_stage_suppression_analytics:
      description: >
        Prospects can be suppressed at ANY of the 9 journey stages. Suppression is detected
        via SUPPRESSION_FLAG in RAW_SFMC_PROSPECT_JOURNEY_DETAILS. The per-stage SENT flags
        show which stages were reached before suppression.
      key_tables:
        - "QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_PROSPECT_JOURNEY_DETAILS — per-stage sent flags + dates"
        - "QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_UNSUBSCRIBES — WHY the prospect did not receive the next email"
      suppression_filter: "UPPER(TRIM(SUPPRESSION_FLAG)) IN ('YES','Y','TRUE','1')"
      stage_sent_flag_values: "VARCHAR 'True' or 'False' — use UPPER(TRIM(col)) = 'TRUE'"
      key_bridge: "RAW_SFMC_UNSUBSCRIBES.SUBSCRIBER_KEY = RAW_SFMC_PROSPECT_JOURNEY_DETAILS.PROSPECT_ID (both = MASTER_PATIENT_ID)"
      last_stage_logic: >
        To find WHICH STAGE a prospect was suppressed at: scan stage SENT flags from Stage 9
        down to Stage 1 — the last 'True' flag is the last stage received. The next stage is
        where suppression took effect.
        Example: Stages 1-3 = 'True', Stage 4 = 'False' + SUPPRESSION_FLAG = 'True'
        → suppressed between Stage 3 and Stage 4.
      inter_stage_date_logic: >
        Each stage has a corresponding _SENT_DATE column (VARCHAR). Use TRY_TO_DATE() to convert.
        GREATEST() across all sent dates gives the last email date for a prospect.
        If unsubscribe EVENT_DATE <= last_email_date + stage_interval → prospect was suppressed
        before receiving the next stage.
      expected_vs_actual: >
        Expected sends for a stage on a date = COUNT(*) FROM JOURNEY_DETAILS
        WHERE that stage's SENT_DATE = target_date (or previous stage date + interval = target_date).
        Actual sent = COUNT(*) WHERE SENT flag = 'True' AND SENT_DATE = target_date.
        Gap = prospects where SENT = 'False' or SUPPRESSION_FLAG = 'True' on that date.
      tool_to_use: "get_sfmc_stage_suppression(target_date, prospect_id) — handles all per-stage and per-prospect suppression questions"

    engagement_path_logic:
      HIGH:
        description: "Progressive or conversion-oriented path"
        expected_stages:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 7
      LOW:
        description: "Re-engagement / low-engagement handling path"
        expected_stages:
          - 8
          - 9

  event_semantics:
    lead_event:
      event_type: "LEAD"
      meaning: "Lead creation before mastering"
      expected_source: "QA_FIPSAR_DW.GOLD.FACT_PROSPECT_INTAKE / mart lead rows"
    sent:
      meaning: "Email was sent"
      key_flags:
        is_expected_send: 1
        is_actual_send: 1
    unsent:
      meaning: "Email was expected or logically considered but did not send"
      notes:
        - "Can reflect suppressed or fatal pathways"
        - "Should be interpreted alongside REASON, DQ_ISSUE_TYPE, and rejection log"
    open:
      meaning: "Email open event"
      notes:
        - "Use IS_UNIQUE to derive unique opens"
    click:
      meaning: "Email click event"
      notes:
        - "Use CLICK_URL and IS_UNIQUE for richer interpretation"
    bounce:
      meaning: "Email bounce event"
      subtypes:
        - "Hard Bounce"
        - "Soft Bounce"
    unsubscribe:
      meaning: "Prospect unsubscribed from communication"
    spam:
      meaning: "Spam complaint / complaint-type signal"

  metrics:
    canonical_kpis:
      - name: "lead_count"
        definition: "Count of rows in QA_FIPSAR_PHI_HUB.STAGING.STG_PROSPECT_INTAKE"
      - name: "invalid_lead_count"
        definition: "Count of rejected lead records in DQ_REJECTION_LOG attributable to intake/mastering rules"
      - name: "valid_prospect_count"
        definition: "Count of accepted Prospect records in PHI_PROSPECT_MASTER or DIM_PROSPECT"
      - name: "lead_to_prospect_conversion_rate"
        definition: "valid_prospect_count / lead_count"
      - name: "rejection_rate"
        definition: "invalid_lead_count / lead_count"
      - name: "suppressed_send_count"
        definition: "Count of records labeled SUPPRESSED"
      - name: "fatal_error_count"
        definition: "Count of records labeled FATAL_ERROR"
      - name: "expected_send_count"
        definition: "Count of rows flagged as expected send in mart"
      - name: "actual_send_count"
        definition: "Count of SENT rows"
      - name: "delivery_rate"
        definition: "delivered_count / actual_send_count"
      - name: "open_rate"
        definition: "open_count / delivered_count"
      - name: "click_rate"
        definition: "click_count / delivered_count"
      - name: "bounce_rate"
        definition: "bounce_count / actual_send_count"
      - name: "unsubscribe_rate"
        definition: "unsubscribe_count / delivered_count"
      - name: "journey_completion_rate"
        definition: "completed_prospects / prospects_entered_journey"
      - name: "data_quality_issue_rate"
        definition: "DQ issue rows / total rows in context"
      - name: "signal_trust_score"
        definition: "AI-level confidence/trust output over data and engagement signals"

  ai_use_cases:
    analyst:
      description: >
        Structured business analysis over prospect intake, journey performance, funnel loss,
        suppression, and observability.
      example_questions:
        - "How many leads became Prospects last week by channel?"
        - "What are the top rejection reasons for invalid leads?"
        - "Which journey stage has the highest drop-off?"
        - "How many sends were suppressed by channel or journey?"
    search:
      description: >
        Semantic retrieval over tables, business definitions, journey structure, rejection reasons,
        and Prospect engagement patterns.
      example_queries:
        - "Find records related to low engagement re-engagement path"
        - "Show all data assets involved in invalid lead handling"
        - "Which tables define suppression and fatal errors?"
    conversational_ai:
      description: >
        Natural language grounded interpretation of the pipeline, funnel, and metrics with
        lineage-aware answers.
      requirements:
        - "Must distinguish Lead vs Prospect."
        - "Must explain DQ rejection behavior."
        - "Must explain suppression as a funnel loss, not just a technical error."
        - "Must ground answers in full table names."
    agents:
      description: >
        Multi-step reasoning agents that trace lineage, detect anomalies, summarize funnel loss,
        and recommend actions.
      action_patterns:
        - "Investigate spike in NULL_EMAIL invalid leads"
        - "Compare suppression trend across journeys"
        - "Surface records and stages causing severe drop-off"
        - "Recommend next best send time or trust low-score review"

