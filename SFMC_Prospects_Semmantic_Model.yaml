                  - "ANOMALY_TYPE"
                  - "BEST_SEND_HOUR"
                  - "BEST_SEND_DAY"
                  - "TRUST_SCORE"
                  - "SCORED_AT"
                  - "MODEL_VERSION"
                  - "RUN_ID"
                join_notes:
                  - "MASTER_PATIENT_ID = DIM_PROSPECT.MASTER_PATIENT_ID for prospect-level joins"
                  - "JOB_ID links to DIM_SFMC_JOB.JOB_ID for journey/stage context"
                  - "SUBSCRIBER_KEY = MASTER_PATIENT_ID (same FIP... value)"
              QA_FIPSAR_AI.AI_SEMANTIC.HIST_UCB_SIGNAL_TRUST_SCORES:
                grain: "Historical archive of signal trust scores (same schema as SEM_UCB)"
                business_role: "Signal trust score history for longitudinal analysis"
              QA_FIPSAR_AI.AI_SEMANTIC.AI_RUN_DETAILS:
                grain: "One row per AI model run (PK: RUN_ID)"
                business_role: "Current model run metadata — version, timestamp, performance"
                key_columns:
                  - "RUN_ID"
                  - "MODEL_VERSION"
                  - "SCORED_AT"
                  - "TOTAL_PROSPECTS_SCORED"
                  - "AUC_ROC"
              QA_FIPSAR_AI.AI_SEMANTIC.HIST_AI_RUN_DETAILS:
                grain: "Historical archive of all model runs (same schema as AI_RUN_DETAILS)"
                business_role: "Model run history for performance tracking over time"

  business_rules:
    intake_mastering_rules:
      description: >
        Incoming rows in STG_PROSPECT_INTAKE are treated as Leads. They must pass mandatory field
        and business validation before being accepted into PHI_PROSPECT_MASTER and treated as Prospects.
      mandatory_fields:
        - "FIRST_NAME"
        - "LAST_NAME"
        - "PHONE_NUMBER"
        - "EMAIL"
      consent_rule:
        rule: "PATIENT_CONSENT must indicate valid consent for acceptance"
      valid_outcome:
        result: "Accepted into QA_FIPSAR_PHI_HUB.PHI_CORE.PHI_PROSPECT_MASTER and treated as a Prospect"
      invalid_outcome:
        result: "Rejected to QA_FIPSAR_AUDIT.PIPELINE_AUDIT.DQ_REJECTION_LOG and treated as an Invalid Lead"
      rejection_reasons:
        canonical_values:
          - "NULL_EMAIL"
          - "NULL_FIRST_NAME"
          - "NULL_LAST_NAME"
          - "NULL_PHONE_NUMBER"
          - "INVALID_FILE_DATE"
        notes_on_no_consent: >
          NO_CONSENT is defined in the semantic model as a concept but is NOT currently enforced
          as a rejection reason in the physical SP_LOAD_PHI_PROSPECT stored procedure.
          Do not count NO_CONSENT rejections when summarising intake rejection reasons.
        pipeline_stage_mapping:
          staging_to_phi: >
            NULL_EMAIL, NULL_FIRST_NAME, NULL_LAST_NAME, NULL_PHONE_NUMBER, INVALID_FILE_DATE —
            rejected at STG_PROSPECT_INTAKE → PHI_PROSPECT_MASTER mastering step.
            DQ_REJECTION_LOG.TABLE_NAME = 'PHI_PROSPECT_MASTER' for these rejections.
          bronze_to_silver: >
            DUPLICATE_RECORD_ID, DUPLICATE_RECORD_ID_IN_BRONZE — rejected during deduplication
            at BRZ_PROSPECT_MASTER → SLV_PROSPECT_MASTER step. Dedup key is RECORD_ID (not MASTER_PATIENT_ID).
            DQ_REJECTION_LOG.TABLE_NAME = 'SLV_PROSPECT_MASTER' for these rejections.
          sfmc_suppression: >
            SUPPRESSED_PROSPECT — rejected at the SFMC send step; Prospect is valid but email
            send was blocked due to suppression flag. FATAL_ERROR for platform-level failures.
            DQ_REJECTION_LOG.TABLE_NAME = 'FACT_SFMC_ENGAGEMENT' for these rejections.
      notes:
        - "Downstream analytics and AI must distinguish Invalid Leads (intake rejections) from valid Prospects."
        - "DUPLICATE_RECORD_ID rejections at Silver represent deduplication — not invalid leads."
        - "SUPPRESSED_PROSPECT at SFMC means the Prospect is valid but their email send was suppressed."
        - "Always use TABLE_NAME in DQ_REJECTION_LOG to distinguish which pipeline stage the rejection came from."

    silver_deduplication_rule:
      description: >
        Before loading to QA_FIPSAR_DW.SILVER.SLV_PROSPECT_MASTER, a deduplication check is run
        against QA_FIPSAR_DW.BRONZE.BRZ_PROSPECT_MASTER. Duplicate records are NOT inserted into Silver.
        Instead they are written to DQ_REJECTION_LOG.
      source: "QA_FIPSAR_DW.BRONZE.BRZ_PROSPECT_MASTER"
      target: "QA_FIPSAR_DW.SILVER.SLV_PROSPECT_MASTER"
      rejection_destination: "QA_FIPSAR_AUDIT.PIPELINE_AUDIT.DQ_REJECTION_LOG"
      rejection_reasons:
        - "DUPLICATE_RECORD_ID — duplicate RECORD_ID already exists in SLV_PROSPECT_MASTER"
        - "DUPLICATE_RECORD_ID_IN_BRONZE — duplicate RECORD_ID found within the current Bronze batch"
      dedup_key: "RECORD_ID (not MASTER_PATIENT_ID — the physical dedup key is RECORD_ID)"
      dq_log_table_name: "SLV_PROSPECT_MASTER"
      scd2_behavior: >
        SLV_PROSPECT_MASTER is SCD Type 2. Each accepted record gets EFF_START_DATE,
        EFF_END_DATE (NULL for current), IS_CURRENT flag, and VERSION_NUM.
        When a prospect record is updated, the prior row is closed (EFF_END_DATE set, IS_CURRENT=FALSE)
        and a new row is opened (IS_CURRENT=TRUE, VERSION_NUM incremented).
      rule: "Only the canonical RECORD_ID version is kept; duplicates are rejected to DQ_REJECTION_LOG"

    sfmc_event_rules:
      description: >
        SFMC raw events are ingested into raw event tables, modeled into FACT_SFMC_ENGAGEMENT,
        and interpreted through journey, stage, and event-type logic.
      valid_event_types:
        - "SENT"
        - "OPEN"
        - "CLICK"
        - "BOUNCE"
        - "UNSUBSCRIBE"
        - "SPAM"
        - "UNSENT"
      suppression_outcomes:
        description: >
          Some send outcomes represent suppression or fatal failures. These are observable
          in the mart and AI layers and are written to DQ_REJECTION_LOG.
        rejection_reasons:
          - "SUPPRESSED_PROSPECT — prospect was suppressed before/during SFMC send (source: RAW_SFMC_PROSPECT_JOURNEY_DETAILS.SUPPRESSION_FLAG)"
          - "FATAL_ERROR — platform-level send failure"
        dq_log_table_name: "FACT_SFMC_ENGAGEMENT (TABLE_NAME value in DQ_REJECTION_LOG for SFMC suppressions)"
      observability_requirement:
        - "Suppressed/fatal outcomes are not silent failures."
        - "They must be measurable in funnel reporting."
        - "They must be available to AI for trust and anomaly use cases."
      data_access_rules:
        - "FACT_SFMC_ENGAGEMENT is the gold engagement table. Filter by DATE(EVENT_TIMESTAMP), NOT by DATE_KEY joined to DIM_DATE."
        - "The DATE_KEY → DIM_DATE join on FACT_SFMC_ENGAGEMENT is broken (surrogate key mismatch) and returns ZERO rows. Never use it for date filtering."
        - "When FACT_SFMC_ENGAGEMENT has no rows for a date range, fall back to QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_* tables."
        - "Raw SFMC tables use JOB_ID to join to DIM_SFMC_JOB for journey and stage resolution."
        - "SUBSCRIBER_KEY in SFMC event tables IS the MASTER_PATIENT_ID (FIP... format). Join directly: fe.SUBSCRIBER_KEY = dp.MASTER_PATIENT_ID. PATIENT_IDENTITY_XREF is NOT needed for this join."
        - "RAW_SFMC_PROSPECT_C and RAW_SFMC_PROSPECT_JOURNEY_DETAILS use PROSPECT_ID (not SUBSCRIBER_KEY) — PROSPECT_ID is also equal to MASTER_PATIENT_ID."
        - "Suppression data lives in DQ_REJECTION_LOG with REJECTION_REASON = 'SUPPRESSED_PROSPECT'. TABLE_NAME = 'FACT_SFMC_ENGAGEMENT' for suppression rows."
        - "Only ACTIVE records from DIM_PROSPECT are exported outbound to SFMC via VW_SFMC_PROSPECT_OUTBOUND. Non-active prospects are NOT in SFMC journeys."
        - "To detect which DIM_PROSPECT records reached SFMC: JOIN DIM_PROSPECT.MASTER_PATIENT_ID = RAW_SFMC_PROSPECT_C.PROSPECT_ID."

  relationships:
    canonical_joins:
      - name: "lead_to_mastered_prospect"
        from: "QA_FIPSAR_PHI_HUB.STAGING.STG_PROSPECT_INTAKE"
        to: "QA_FIPSAR_PHI_HUB.PHI_CORE.PHI_PROSPECT_MASTER"
        join_logic: "Mastering/validation process"
        cardinality: "Many leads -> accepted mastered prospect records"
      - name: "prospect_to_identity_xref"
        from: "QA_FIPSAR_PHI_HUB.PHI_CORE.PHI_PROSPECT_MASTER.MASTER_PATIENT_ID"
        to: "QA_FIPSAR_PHI_HUB.PHI_CORE.PATIENT_IDENTITY_XREF.MASTER_PATIENT_ID"
        join_logic: "Identity mapping"
        cardinality: "One prospect -> one or more identity mappings"
      - name: "phi_to_bronze"
        from: "QA_FIPSAR_PHI_HUB.PHI_CORE.PHI_PROSPECT_MASTER"
        to: "QA_FIPSAR_DW.BRONZE.BRZ_PROSPECT_MASTER"
        join_logic: "Direct warehouse copy"
        cardinality: "1:1 row propagation"
      - name: "bronze_to_silver"
        from: "QA_FIPSAR_DW.BRONZE.BRZ_PROSPECT_MASTER"
        to: "QA_FIPSAR_DW.SILVER.SLV_PROSPECT_MASTER"
        join_logic: "Standardization + historization"
        cardinality: "One bronze row may produce one or more historized silver versions over time"
      - name: "silver_to_dim_prospect"
        from: "QA_FIPSAR_DW.SILVER.SLV_PROSPECT_MASTER.MASTER_PATIENT_ID"
        to: "QA_FIPSAR_DW.GOLD.DIM_PROSPECT.MASTER_PATIENT_ID"
        join_logic: "Current mastered projection"
        cardinality: "Many silver versions -> one current dimension prospect"
      - name: "fact_prospect_intake_to_dim_prospect"
        from: "QA_FIPSAR_DW.GOLD.FACT_PROSPECT_INTAKE.PROSPECT_KEY"
        to: "QA_FIPSAR_DW.GOLD.DIM_PROSPECT.PROSPECT_KEY"
        join_logic: "FK"
        cardinality: "Many intake facts -> one prospect"
      - name: "fact_prospect_intake_to_dim_channel"
        from: "QA_FIPSAR_DW.GOLD.FACT_PROSPECT_INTAKE.CHANNEL_KEY"
        to: "QA_FIPSAR_DW.GOLD.DIM_CHANNEL.CHANNEL_KEY"
        join_logic: "FK"
        cardinality: "Many intake facts -> one channel"
      - name: "fact_prospect_intake_to_dim_date"
        from: "QA_FIPSAR_DW.GOLD.FACT_PROSPECT_INTAKE.DATE_KEY"
        to: "QA_FIPSAR_DW.GOLD.DIM_DATE.DATE_KEY"
        join_logic: "FK"
        cardinality: "Many intake facts -> one date"
      - name: "fact_prospect_intake_to_dim_geography"
        from: "QA_FIPSAR_DW.GOLD.FACT_PROSPECT_INTAKE.GEO_KEY"
        to: "QA_FIPSAR_DW.GOLD.DIM_GEOGRAPHY.GEO_KEY"
        join_logic: "FK"
        cardinality: "Many intake facts -> one geography"
      - name: "raw_job_metadata_to_dim_job"
        from: "QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_JOB_METADATA.JOB_ID"
        to: "QA_FIPSAR_DW.GOLD.DIM_SFMC_JOB.JOB_ID"
        join_logic: "Job metadata conformance"
        cardinality: "Many raw metadata rows -> one job dimension row"
      - name: "fact_engagement_to_dim_job"
        from: "QA_FIPSAR_DW.GOLD.FACT_SFMC_ENGAGEMENT.JOB_KEY"
        to: "QA_FIPSAR_DW.GOLD.DIM_SFMC_JOB.JOB_KEY"
        join_logic: "FK"
        cardinality: "Many engagement facts -> one job"
      - name: "fact_engagement_to_dim_engagement_type"
        from: "QA_FIPSAR_DW.GOLD.FACT_SFMC_ENGAGEMENT.EVENT_TYPE_KEY"
        to: "QA_FIPSAR_DW.GOLD.DIM_ENGAGEMENT_TYPE.EVENT_TYPE_KEY"
        join_logic: "FK"
        cardinality: "Many engagement facts -> one event type"
      - name: "fact_engagement_to_dim_date"
        from: "QA_FIPSAR_DW.GOLD.FACT_SFMC_ENGAGEMENT.DATE_KEY"
        to: "QA_FIPSAR_DW.GOLD.DIM_DATE.DATE_KEY"
        join_logic: "FK"
        cardinality: "Many engagement facts -> one date"
      - name: "subscriber_to_dim_prospect_direct"
        from: "QA_FIPSAR_DW.GOLD.FACT_SFMC_ENGAGEMENT.SUBSCRIBER_KEY"
        to: "QA_FIPSAR_DW.GOLD.DIM_PROSPECT.MASTER_PATIENT_ID"
        join_logic: "SUBSCRIBER_KEY IS the MASTER_PATIENT_ID (FIP... format). Direct join — no crosswalk needed."
        join_sql: "fe.SUBSCRIBER_KEY = dp.MASTER_PATIENT_ID"
        cardinality: "Many engagement facts -> one prospect"
      - name: "raw_event_subscriber_to_dim_prospect"
        from: "QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_SENT.SUBSCRIBER_KEY (and all raw event tables)"
        to: "QA_FIPSAR_DW.GOLD.DIM_PROSPECT.MASTER_PATIENT_ID"
        join_logic: "SUBSCRIBER_KEY in raw event tables = MASTER_PATIENT_ID. Direct join."
        join_sql: "raw.SUBSCRIBER_KEY = dp.MASTER_PATIENT_ID"
        cardinality: "Many raw events -> one prospect"
      - name: "sfmc_prospect_c_to_dim_prospect"
        from: "QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_PROSPECT_C.PROSPECT_ID"
        to: "QA_FIPSAR_DW.GOLD.DIM_PROSPECT.MASTER_PATIENT_ID"
        join_logic: "PROSPECT_ID = MASTER_PATIENT_ID. Used for outbound reconciliation."
        join_sql: "pc.PROSPECT_ID = dp.MASTER_PATIENT_ID"
        cardinality: "One SFMC prospect record -> one DIM_PROSPECT row"
      - name: "journey_details_to_dim_prospect"
        from: "QA_FIPSAR_SFMC_EVENTS.RAW_EVENTS.RAW_SFMC_PROSPECT_JOURNEY_DETAILS.PROSPECT_ID"
        to: "QA_FIPSAR_DW.GOLD.DIM_PROSPECT.MASTER_PATIENT_ID"
        join_logic: "PROSPECT_ID = MASTER_PATIENT_ID. Direct join for per-stage suppression analysis."
        join_sql: "jd.PROSPECT_ID = dp.MASTER_PATIENT_ID"
        cardinality: "One journey detail row -> one prospect"
      - name: "dim_prospect_outbound_to_sfmc"
        from: "QA_FIPSAR_DW.GOLD.DIM_PROSPECT (active records only)"
        to: "QA_FIPSAR_DW.GOLD.VW_SFMC_PROSPECT_OUTBOUND -> S3 -> SFMC"
