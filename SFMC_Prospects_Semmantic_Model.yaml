  configuration:
    semantic_defaults:
      default_business_entity: "Prospect"
      pre_master_entity: "Lead"
      rejected_entity: "Invalid Lead"
      default_identity_bridge_table: "QA_FIPSAR_PHI_HUB.PHI_CORE.PATIENT_IDENTITY_XREF"
      default_business_mart: "QA_FIPSAR_DW.GOLD.VW_MART_JOURNEY_INTELLIGENCE"
      default_observability_table: "QA_FIPSAR_AUDIT.PIPELINE_AUDIT.DQ_REJECTION_LOG"
    retrieval_defaults:
      prefer_business_mart_for_reporting: true
      prefer_raw_tables_for_provenance: true
      prefer_audit_tables_for_dropoff_explanation: true
      prefer_gold_dimensions_for conformed_context: true
      prefer_ai_semantic_tables_for scored_interpretation: true
    explainability_priorities:
      - "business meaning first"
      - "then physical table names"
      - "then lineage"
      - "then metrics"
      - "then AI implications"

  recommended_intents:
    intents:
      - name: "summarize_funnel"
        description: "Summarize the lead-to-prospect-to-engagement funnel and identify biggest losses"
      - name: "trace_record_lineage"
        description: "Trace a lead or subscriber through intake, mastering, engagement, mart, and AI"
      - name: "explain_rejection_reason"
        description: "Explain why a record was invalid or suppressed"
      - name: "compare_journey_performance"
        description: "Compare journeys or stages on sends, opens, clicks, and drop-offs"
      - name: "surface_observability_risks"
        description: "Find data quality, suppression, or trust issues needing attention"
      - name: "recommend_action"
        description: "Suggest operational or marketing actions based on funnel and AI signals"

  final_summary:
    narrative: >
      This semantic layer encodes the full business logic of the FIPSAR MVP: Leads enter the
      system through intake, are validated into valid Prospects or Invalid Leads, valid Prospects
      are identity-linked and modeled through warehouse layers, SFMC engagement and suppression
      events are captured with observability, the journey mart exposes funnel and lineage behavior,
      and the AI layer learns from both positive engagement outcomes and negative quality/suppression
      outcomes to support analyst, search, conversational AI, and agentic reasoning.