services:
  - type: web
    name: frel-prospect-journey
    runtime: python
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SNOWFLAKE_USER
        sync: false
      - key: SNOWFLAKE_PASSWORD
        sync: false
      - key: SNOWFLAKE_ACCOUNT
        sync: false
      - key: SNOWFLAKE_WAREHOUSE
        sync: false
      - key: SNOWFLAKE_DATABASE
        sync: false
      - key: SNOWFLAKE_SCHEMA
        sync: false
      - key: SNOWFLAKE_ROLE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: AGENT_MAX_ITERATIONS
        value: "30"
      - key: SEARCH_MAX_ROWS
        value: "50"
      - key: EMAIL_SMTP_HOST
        value: smtp.gmail.com
      - key: EMAIL_SMTP_PORT
        value: "587"
      - key: EMAIL_SMTP_USER
        sync: false
      - key: EMAIL_SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: EMAIL_FROM_NAME
        value: FIPSAR Intelligence
      - key: EMAIL_TO
        sync: false
